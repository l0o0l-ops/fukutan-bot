<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>インテリジェント・シラバス</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="lobby">
  <div class="lobby-shell">
    <header class="lobby-header">
      <div class="brand">
        <span class="brand-mark">Σ</span>
        <div>
          <h1>インテリジェント・シラバス</h1>
          <p class="tagline">シラバスを配置するだけで、あなた専属の「ソクラテス」が誕生する</p>
        </div>
      </div>
    </header>

    <main class="lobby-main">
      <section class="panel">
        <div class="panel-head">
          <h2>担当している授業</h2>
          <span class="eyebrow">Class Roster</span>
        </div>
        <ul id="class-list" class="class-list">
          <li class="empty-row">読み込み中...</li>
        </ul>
      </section>

      <section class="panel panel-create">
        <div class="panel-head">
          <h2>新しい授業を開く</h2>
          <span class="eyebrow">New Class</span>
        </div>
        <form id="create-class-form" class="inline-form">
          <input type="text" id="new-class-name" placeholder="例：応用化学 特講" required />
          <button type="submit" class="btn btn-primary">作成する</button>
        </form>
        <p id="create-error" class="form-error"></p>
      </section>
    </main>
  </div>

  <script type="module">
    import { fetchClasses, createClass } from "/static/js/api.js";

    async function renderClassList() {
      const list = document.getElementById("class-list");
      const classes = await fetchClasses();
      if (classes.length === 0) {
        list.innerHTML = `<li class="empty-row">まだ授業がありません。右のフォームから作成してください。</li>`;
        return;
      }
      list.innerHTML = classes
        .map(
          (c) => `
        <li class="class-row">
          <a href="/class/${c.class_id}">
            <span class="class-name">${c.class_name}</span>
            <span class="class-arrow">→</span>
          </a>
        </li>`
        )
        .join("");
    }

    document.getElementById("create-class-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const nameInput = document.getElementById("new-class-name");
      const errorEl = document.getElementById("create-error");
      errorEl.textContent = "";
      try {
        const { class_id } = await createClass(nameInput.value);
        window.location.href = `/class/${class_id}`;
      } catch (err) {
        errorEl.textContent = err.message;
      }
    });

    renderClassList();
  </script>
</body>
</html>
