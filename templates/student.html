<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>学生コクピット｜インテリジェント・シラバス</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body data-class-id="{{ class_id }}">
  <header class="app-header">
    <a href="/class/{{ class_id }}" class="back-link">← 入口に戻る</a>

    <span class="role-chip">👤 学生</span>
  </header>


  <!-- ============ コクピット画面 ============ -->
  <section id="cockpit-screen" >
    <div class="student-toolbar">
      <span id="student-display-name" class="current-user-name"></span>
      <button id="switch-student-btn" class="btn-link">別の生徒に切り替える</button>
    </div>

    <div class="cockpit-grid">
      <div class="panel col-modules">
        <div class="panel-head"><h2>講義章リスト</h2><span class="eyebrow">Syllabus</span></div>
        <ul id="module-list" class="module-list"></ul>
        <div id="status-badge" class="status-badge"></div>
      </div>

      <div class="panel col-chat">
        <div class="panel-head">
          <h2>対話による口頭試問</h2>
          <span class="eyebrow" id="module-goal"></span>
        </div>
        <div id="chat-window" class="chat-window"></div>
        <form id="chat-form" class="chat-form">
          <input type="text" id="chat-input" placeholder="自分の言葉で説明してみよう..." autocomplete="off" />
          <button type="submit" class="btn btn-primary">送信</button>
        </form>
      </div>

      <div class="panel col-status">
        <div class="panel-head"><h2>リアルタイム能力査定</h2><span class="eyebrow">Assessment</span></div>
        <div class="gauge-list" id="gauge-list"></div>
        <canvas id="student-radar" width="260" height="260"></canvas>
      </div>
    </div>
  </section>

  <div id="toast" class="toast"></div>
  <div id="confetti-layer" class="confetti-layer"></div>

  <script type="module" src="/static/js/student.js"></script>
</body>
</html>
