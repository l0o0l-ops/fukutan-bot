<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI副担任：フクタン - マスタ管理 (Settings)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .nav-link:hover { color: var(--text-main); }
        
        .list-container {
            list-style: none;
            padding: 0;
            margin: 0 0 20px 0;
        }
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg-ink);
            border: 1px solid var(--border-ink);
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 10px;
        }
        .delete-btn {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 0.85rem;
            padding: 4px 8px;
        }
        .delete-btn:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <header style="display: flex; justify-content: space-between; align-items: baseline;">
            <h1>FUKUTAN <span class="subtitle">| System Settings</span></h1>
            <a href="/" class="nav-link">🏠 Back to Portal (戻る)</a>
        </header>

        <main class="main-layout">
            <section class="chat-section">
                <div class="section-header">
                    <h2>Class Management</h2>
                    <p>授業の追加と削除</p>
                </div>
                <div style="padding: 20px; flex: 1; overflow-y: auto;">
                    <ul class="list-container" id="class-list">
                        <li class="list-item" id="class-1">
                            <span>DevOps基礎講座2026</span>
                            <button class="delete-btn" onclick="deleteItem('class-1', '授業')">🗑️ 削除</button>
                        </li>
                        <li class="list-item" id="class-2">
                            <span>クラウドアーキテクチャ概論</span>
                            <button class="delete-btn" onclick="deleteItem('class-2', '授業')">🗑️ 削除</button>
                        </li>
                    </ul>

                    <div class="input-area" style="border: none; padding: 0; margin-top: 20px;">
                        <input type="text" id="new-class-input" placeholder="新しい授業名を入力..." autocomplete="off">
                        <button id="add-class-btn">追加</button>
                    </div>
                </div>
            </section>

            <section class="status-section">
                <div class="section-header">
                    <h2>Student Management</h2>
                    <p>生徒の登録と削除</p>
                </div>
                <div style="padding: 20px; flex: 1; overflow-y: auto;">
                    <ul class="list-container" id="student-list">
                        <li class="list-item" id="student-1">
                            <span>student_001 (田中)</span>
                            <button class="delete-btn" onclick="deleteItem('student-1', '生徒')">🗑️ 削除</button>
                        </li>
                        <li class="list-item" id="student-2">
                            <span>student_002 (佐藤)</span>
                            <button class="delete-btn" onclick="deleteItem('student-2', '生徒')">🗑️ 削除</button>
                        </li>
                    </ul>

                    <div class="input-area" style="border: none; padding: 0; margin-top: 20px;">
                        <input type="text" id="new-student-input" placeholder="生徒IDや名前を入力..." autocomplete="off">
                        <button id="add-student-btn">追加</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/js/settings.js"></script>
</body>
</html>
