<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教授用ダッシュボード</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-wrapper">
        <header style="display: flex; justify-content: space-between; align-items: baseline;">
            <h1>FUKUTAN <span class="subtitle">| Professor Dashboard</span></h1>
            <a href="/" class="nav-link">🏠 Portalに戻る</a>
        </header>

        <main class="main-layout">
            <section class="chat-section" style="flex: 3;">
                <div class="section-header"><h2>View Target</h2></div>
                <ul class="target-list" id="target-selector">
                    <li class="target-item active" data-target="panel-overall">📊 クラス全体傾向・章管理</li>
                    </ul>
            </section>

            <section class="status-section" style="flex: 7; padding: 20px;" id="panel-container">
                <div id="panel-overall" class="content-panel active">
                    <h2>クラス全体平均</h2>
                    <div style="height: 200px;"><canvas id="overall-radar"></canvas></div>
                </div>
                </section>
        </main>
    </div>
    <script src="/static/js/professor.js"></script>
</body>
</html>
